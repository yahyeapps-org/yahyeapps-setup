apiVersion: projectcalico.org/v3
kind: GlobalNetworkPolicy
metadata:
  name: enforce-cluster-proxy
spec:
  # Select all pods except system namespaces
  selector: all() && !namespace.matches("kube-system|cert-manager")
  types:
    - Egress
  egress:
    # Allow traffic to Envoy proxy only (replace IP/port as needed)
    - action: Allow
      destination:
        selector: app == "envoy"
        ports:
          - 8080
  # Default deny everything else
  applyOnForwardedIPs: true

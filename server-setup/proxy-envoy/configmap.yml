apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: yahyeapps
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: backend
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: some_service
                    http_filters:
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          inline_code: |
                            local f = io.open("/etc/envoy/token_filter.lua")
                            local code = f:read("*a")
                            f:close()
                            load(code)()
                      - name: envoy.filters.http.router

      clusters:
        - name: some_service
          connect_timeout: 1s
          type: STATIC
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: some_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 4000

  token_filter.lua: |
    function envoy_on_request(request_handle)
        local allowed_token = os.getenv("ALLOWED_REQUEST_TOKEN")
        local header_value = request_handle:headers():get("x-yahyeapps-verify")

        if header_value ~= allowed_token then
            request_handle:respond({[":status"] = "403"}, "Forbidden")
        end
    end

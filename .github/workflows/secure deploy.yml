name: "Deploy "

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read
  security-events: write

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ----------------------------
  # 5️⃣ Docker Build & Push
  # ----------------------------
  docker:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message == 'deploy'
    timeout-minutes: 20 # Maximum running time for this job
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT_TOKEN }} # Fixed typo: was DOCKER_PAT_TOKEN

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./server-setup/self-hosted-github-runners
          push: true
          tags: |
            ${{vars.DOCKER_GIT_ACTION_RUNNER_REPO}}:${{ env.IMAGE_TAG }}
            ${{vars.DOCKER_GIT_ACTION_RUNNER_REPO}}:latest

  server:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Maximum running time for this job
    needs: [docker]
    steps:
      - uses: actions/checkout@v4

      - name: Update image tag in deployment FOR git-actions-self-hosted-runner
        run: |
          if [ -f "server-setup/self-hosted-github-runners/deploment.yml" ]; then
            sed -i "s|image: ${{vars.DOCKER_GIT_ACTION_RUNNER_REPO}}.*|image: ${{vars.DOCKER_GIT_ACTION_RUNNER_REPO}}:${{ env.IMAGE_TAG }}|g" \
              server-setup/self-hosted-github-runners/deploment.yml
            echo "✅ Updated deployment.yaml to use image: ${{ vars.DOCKER_GIT_ACTION_RUNNER_REPO }}:${{ env.IMAGE_TAG }}"
          else
            echo "⚠️ Warning: server-setup/self-hosted-github-runners/deploment.yml not found, skipping inline update"
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_WITH_NO_PASSPHRASE }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST_IP }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          if ! ssh -o BatchMode=yes \
              -o ConnectTimeout=10 \
              -i ~/.ssh/id_rsa \
              ${{ vars.SSH_USER }}@${{ secrets.SSH_HOST_IP }} \
              "echo Connected successfully"
          then
            echo "❌ SSH connection failed, is this user created in in server (github-actions)  "
            exit 1  
          fi

      - name: Copy files to server
        run: |
          scp -o BatchMode=yes -o ConnectTimeout=10 \
          -i ~/.ssh/id_rsa -r ./server-setup \
          ${{ vars.SSH_USER }}@${{ secrets.SSH_HOST_IP }}:/tmp

      - name: Run full server setup on remote machine
        run: |
          ssh -i ~/.ssh/id_rsa \
            ${{ vars.SSH_USER }}@${{ secrets.SSH_HOST_IP }} <<'EOF'

            set -euo pipefail

            if [ -f /home/${{ vars.SSH_USER }}/.server-ready ]; then
              echo "✅ Server already configured"
              exit 0
            fi

            cd /tmp

            echo "🚀 Starting server setup..."

            # Make shell scripts executable
            find server-setup -type f -name "*.sh" -exec chmod +x {} +

            # Replace namespaces
            find server-setup \( -name "*.yml" -o -name "*.yaml" \) \
              -exec sed -i "s|^[[:space:]]*namespace: .*|  namespace: ${{ vars.NAMESPACE }}|g" {} +

            # ====================================
            # Server Config
            # ====================================

            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S bash \
              /tmp/server-setup/server-config/server-config.sh \
              "${{ vars.SSH_USER }}"

            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "export KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> ~/.bashrc


            # ====================================
            # Namespaces
            # ====================================

            kubectl create namespace ${{ vars.NAMESPACE }} \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create namespace cert-manager \
              --dry-run=client -o yaml | kubectl apply -f -

            # ====================================
            # Calico
            # ====================================

            kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.3/manifests/calico.yaml


            echo "Waiting for Calico API registration..."

          for i in {1..30}; do
            if kubectl api-resources | grep -q GlobalNetworkPolicy; then
              echo "✅ GlobalNetworkPolicy API is available"
              break
            fi
            echo "Waiting for Calico API... ($i/30)"
            sleep 5
          done
                  

            # ====================================
            # Envoy Proxy
            # ====================================
            # Refresh kubectl discovery cache
            kubectl api-resources >/dev/null

            kubectl apply -f /tmp/server-setup/nginx-proxy/configmap.yml
            kubectl apply -f /tmp/server-setup/nginx-proxy/deployment.yml
            kubectl apply -f /tmp/server-setup/nginx-proxy/service.yml

            kubectl apply -f "/tmp/server-setup/nginx-proxy/network policy.yml"



            # ====================================
            # Helm repos
            # ====================================

            helm repo add bitnami https://charts.bitnami.com/bitnami
            helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
            helm repo add jetstack https://charts.jetstack.io

            helm repo update

            # ====================================
            # NGINX Ingress
            # ====================================

            helm upgrade --install nginx-ingress \
              ingress-nginx/ingress-nginx \
              --namespace ${{ vars.NAMESPACE }} \
              --set controller.allowSnippetAnnotations=true \
              --set controller.admissionWebhooks.enabled=false \
              --set controller.image.pullPolicy=IfNotPresent

            kubectl apply -f /tmp/server-setup/ngnix/nginx-config.yaml

            # ====================================
            # Redis
            # ====================================

            helm upgrade --install redis bitnami/redis \
              --namespace ${{ vars.NAMESPACE }} \
              --create-namespace \
              --set auth.enabled=false \
              --set master.resources.requests.cpu="100m" \
              --set master.resources.requests.memory="80Mi" \
              --set master.resources.limits.cpu="100m" \
              --set master.resources.limits.memory="80Mi" \
              --set replica.resources.requests.cpu="100m" \
              --set replica.resources.requests.memory="80Mi" \
              --set replica.resources.limits.cpu="100m" \
              --set replica.resources.limits.memory="80Mi"

            # ====================================
            # Cert Manager
            # ====================================

            kubectl create secret generic cloudflare-api-token \
              -n cert-manager \
              --from-literal=api-token='${{ secrets.CLOUDFLARE_PAT_TOKEN }}' \
              --dry-run=client -o yaml | kubectl apply -f -

            helm upgrade --install cert-manager \
              jetstack/cert-manager \
              --namespace cert-manager \
              --create-namespace \
              --set crds.enabled=true

            kubectl apply -f \
              /tmp/server-setup/cert-manager/issuer-cluster-letsencrtypt.yml

            # ====================================
            # Postgres Secret  and bgbouncer 
            # ====================================

            kubectl create secret generic yahyeapps-postgres-secret \
              -n ${{ vars.NAMESPACE }} \
              --from-literal=POSTGRES_USER='${{ secrets.PG_USER }}' \
              --from-literal=POSTGRES_PASSWORD='${{ secrets.PG_PASSWORD }}' \
              --from-literal=POSTGRES_DB='${{ secrets.PG_DB }}' \
              --from-literal=POSTGRES_HOST='${{ secrets.PG_HOST }}' \
              --from-literal=POSTGRES_PORT='${{ secrets.PG_PORT }}' \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret generic pgbouncer-users \
              -n yahyeapps \
              --from-literal="userlist.txt=\"${{ secrets.PG_USER }}\" \"${{ secrets.PG_PASSWORD }}\"" \
              --dry-run=client -o yaml | kubectl apply -f -
            # ====================================
            # Allowed Request Token
            # ====================================

            kubectl create secret generic allowed-request-token \
              -n ${{ vars.NAMESPACE }} \
              --from-literal=allowed_request_token='${{ secrets.ALLOWED_REQUEST_TOKEN }}' \
              --dry-run=client -o yaml | kubectl apply -f -

            # ====================================
            # Deploy Services
            # ====================================

            kubectl apply -f /tmp/server-setup/postgres
            kubectl apply -f /tmp/server-setup/pg_bouncer

            # ====================================
            # GitHub Self Hosted Runner
            # ====================================

            kubectl create secret generic github-runner-token \
              -n ${{ vars.NAMESPACE }} \
              --from-literal=RUNNER_TOKEN='${{ secrets.SELF_HOSTED_RUNNER_TOKEN }}' \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl apply -f \
              /tmp/server-setup/self-hosted-github-runners/deploment.yml

            # ====================================
            # Cleanup
            # ====================================

            rm -rf /tmp/server-setup

            echo "ready" > /home/${{ vars.SSH_USER }}/.server-ready

            echo "✅ Server setup completed successfully"

          EOF
